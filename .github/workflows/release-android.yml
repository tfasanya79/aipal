name: Release Android

on:
  push:
    tags: ['mobile/*']

jobs:
  build-aab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
      - name: Build AAB
        run: |
          cd apps/mobile
          flutter pub get
          flutter build appbundle --release \
            --dart-define=API_BASE_URL=https://43.160.220.9.sslip.io/api/v2
      - uses: actions/upload-artifact@v4
        with:
          name: aipal-aab
          path: apps/mobile/build/app/outputs/bundle/release/app-release.aab
      - name: Upload to Play Internal
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: io.aipal.mvp
          releaseFiles: apps/mobile/build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
