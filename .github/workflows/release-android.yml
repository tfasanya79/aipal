name: Release Android

on:
  push:
    tags: ['mobile/*']

jobs:
  build-aab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
      - name: Build AAB
        run: |
          cd apps/mobile
          flutter pub get
          flutter build appbundle --release \
            --dart-define=API_BASE_URL=https://43.160.220.9.sslip.io/api/v2
      - uses: actions/upload-artifact@v4
        with:
          name: aipal-aab
          path: apps/mobile/build/app/outputs/bundle/release/app-release.aab
      # Play Internal upload is handled by scripts/deploy-android-internal.sh on the VM.
      # Run: ssh aipal-vm "cd ~/aipal && git pull && bash scripts/deploy-android-internal.sh"
