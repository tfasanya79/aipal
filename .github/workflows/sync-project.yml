name: Sync GitHub Project

on:
  push:
    branches: [main]
    paths:
      - docs/PRODUCT.md
      - apps/mobile/pubspec.yaml
      - .github/project.json
      - scripts/sync_github_project.py
      - scripts/bootstrap_github_project.sh
      - .github/workflows/sync-project.yml
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  projects: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Bootstrap and sync PRODUCT.md to GitHub Project
        env:
          GITHUB_TOKEN: ${{ secrets.PROJECT_SYNC_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euxo pipefail
          python3 scripts/sync_github_project.py --bootstrap 2>&1 | tee sync.log

      - name: Upload sync log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sync-project-log
          path: sync.log

      - name: Commit project.json if bootstrap wrote config
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/project.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update GitHub project sync config [skip ci]"
            git push origin HEAD:main
          fi
