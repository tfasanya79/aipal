name: Sync GitHub Project

on:
  push:
    branches: [main]
    paths:
      - docs/PRODUCT.md
      - apps/mobile/pubspec.yaml
      - .github/project.json
      - scripts/sync_github_project.py
      - .github/workflows/sync-project.yml
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  projects: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync PRODUCT.md to GitHub Project
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 scripts/sync_github_project.py --bootstrap
