name: Sync GitHub Project

on:
  push:
    branches: [main]
    paths:
      - docs/PRODUCT.md
      - apps/mobile/pubspec.yaml
      - .github/project.json
      - scripts/sync_github_project.py
      - .github/workflows/sync-project.yml
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  projects: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap project (gh CLI)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GITHUB_REPOSITORY_NAME: ${{ github.event.repository.name }}
        run: bash scripts/bootstrap_github_project.sh

      - name: Sync PRODUCT.md to GitHub Project
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 scripts/sync_github_project.py

      - name: Commit project.json if bootstrap wrote config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/project.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update GitHub project sync config [skip ci]"
            git push
          fi
