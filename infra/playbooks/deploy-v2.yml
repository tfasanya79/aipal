---
- name: Deploy AIpal v2 API
  hosts: tencent_vm
  become: true
  vars:
    aipal_v2_deploy_dir: /opt/aipal-v2
    aipal_v2_port: 8102
    aipal_service_user: teems

  tasks:
    - name: Ensure v2 deploy directory
      ansible.builtin.file:
        path: "{{ aipal_v2_deploy_dir }}/apps/api"
        state: directory
        owner: "{{ aipal_service_user }}"
        mode: "0755"

    - name: Sync v2 API source
      ansible.posix.synchronize:
        src: "{{ playbook_dir }}/../../apps/api/"
        dest: "{{ aipal_v2_deploy_dir }}/apps/api/"
        delete: true
        rsync_opts:
          - "--exclude=.venv"
          - "--exclude=__pycache__"
      become: false

    - name: Create venv
      ansible.builtin.command:
        cmd: python3 -m venv .venv
        chdir: "{{ aipal_v2_deploy_dir }}/apps/api"
        creates: "{{ aipal_v2_deploy_dir }}/apps/api/.venv"
      become_user: "{{ aipal_service_user }}"

    - name: Install requirements
      ansible.builtin.pip:
        requirements: "{{ aipal_v2_deploy_dir }}/apps/api/requirements.txt"
        virtualenv: "{{ aipal_v2_deploy_dir }}/apps/api/.venv"
      become_user: "{{ aipal_service_user }}"

    - name: Install systemd unit for v2
      ansible.builtin.template:
        src: aipal-v2.service.j2
        dest: /etc/systemd/system/aipal-v2.service
        mode: "0644"
      notify: restart aipal-v2

  handlers:
    - name: restart aipal-v2
      ansible.builtin.systemd:
        name: aipal-v2
        state: restarted
        enabled: true
        daemon_reload: true
